# Zik — Development environment
# Start with: docker compose up
# Astro dev server on http://localhost:4321/zik/
# Templates are generated at build time via: docker compose run templates

services:
  # ---------------------------------------------------------------------------
  # Astro + Starlight dev server with HMR
  # ---------------------------------------------------------------------------
  dev:
    image: node:22-slim
    container_name: zik-dev
    working_dir: /app
    ports:
      - "4321:4321"
    volumes:
      - ./.git:/app/.git:ro          # Git history (read-only — not needed by Astro)
      - ./astro.config.mjs:/app/astro.config.mjs
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./src:/app/src
      - ./public:/app/public
      - node_modules:/app/node_modules  # Docker-managed volume (avoids root ownership)
    command: >
      sh -c "
        [ -d node_modules/astro ] || npm ci --quiet &&
        npx astro dev --host 0.0.0.0 --port 4321
      "
    environment:
      - NODE_ENV=development
    init: true
    stop_signal: SIGINT

  # ---------------------------------------------------------------------------
  # Template generation (one-shot)
  # Usage: docker compose run --rm templates
  # ---------------------------------------------------------------------------
  templates:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    container_name: zik-templates
    working_dir: /app/scripts
    volumes:
      - ./scripts:/app/scripts
      - ./public/templates:/app/public/templates
    entrypoint: []
    command: >
      sh -c "
        apt-get update -qq && apt-get install -y -qq pandoc &&
        uv sync --quiet &&
        uv run python generate_templates.py
      "
    profiles:
      - tools

volumes:
  node_modules:
